<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech4 Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="grid grid-rows-[auto_1fr_auto] min-h-screen m-0 p-0 font-sans">

    <header id="main-header" class="bg-slate-900 text-white shadow-md z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 relative grid grid-cols-1 justify-items-center">
            <div class="absolute left-4 top-4">
                <i data-feather="settings" class="w-8 h-8 text-gray-400"></i>
            </div>
            <h1 class="text-3xl font-bold">Tech4 Solutions</h1>
            <nav class="mt-4 space-x-3 text-sm text-gray-300">
                <a href="#" class="hover:text-white">Home</a>
                <a href="#" class="hover:text-white">Products</a>
                <a href="#" class="hover:text-white">About Us</a>
                <a href="#" class="hover:text-white">Resources</a>
            </nav>
        </div>
    </header>

    <div id="main-wrapper" class="grid grid-cols-5 flex-grow">

        <nav id="main-navigation" class="col-span-1 grid grid-cols-1 content-start bg-slate-100 p-4 border-r border-slate-300">
            <div class="rounded-xl bg-gradient-to-b from-[#32455a] via-[#1a2634] to-[#121a24] p-2 shadow-xl">
                <h2 class="text-white text-[24px] p-2 font-bold underline decoration-1 mb-2">Navigation</h2>
                <ul class="grid grid-cols-1 gap-2">
                    <li>
                        <a href="#" class="flex items-center rounded-xl p-3 text-white hover:bg-gray-100 hover:text-slate-700 transition duration-300">
                            <i data-feather="grid" class="w-5 h-5"></i>
                            <span class="text-[16px] ml-4 hover:underline">Dashboard</span>
                        </a>
                    </li>
                    </ul>
            </div>
        </nav>

        <main id="main-content" class="col-span-3 grid grid-cols-1 content-start bg-white p-6">
            <article class="grid grid-cols-1 gap-4 text-slate-800">
                <h2 class="text-2xl font-bold">Selamat Datang di Tech4 Solutions</h2>
                <p>Silakan isi konten utama di sini.</p>
            </article>
        </main>

        <aside id="right-sidebar" class="col-span-1 grid grid-cols-1 content-start bg-slate-50 p-4 border-l border-slate-300">
            <div class="grid grid-cols-1 gap-4">
                <img src="https://via.placeholder.com/300x200" alt="Solusi Teknologi" class="w-full rounded-lg shadow">
                <h3 class="text-lg font-bold text-slate-800">Layanan Kami</h3>
                <ul class="grid grid-cols-1 gap-2 text-sm text-slate-600">
                    <li>✅ Pembuatan Website</li>
                    <li>✅ Integrasi API</li>
                    <li>✅ UI/UX Design</li>
                </ul>
                <a href="#" class="mt-4 bg-blue-600 text-white py-2 px-4 rounded-lg text-center font-bold hover:bg-blue-700">Hubungi Kami</a>
            </div>
        </aside>

    </div>

    <footer id="main-footer" class="bg-slate-900 text-white p-6 text-center">
    </footer>

    <script>
        feather.replace();
    </script>
</body>
</html>
